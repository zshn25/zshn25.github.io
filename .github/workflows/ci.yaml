name: CI
on:
  push:
    branches:
      - master
      - master
  pull_request:
  workflow_dispatch:

# Grant GITHUB_TOKEN permissions for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-site:
    if: ( github.event.commits[0].message != 'Initial commit' ) || github.run_number > 1
    runs-on: ubuntu-latest
    steps:

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        submodules: true

    - name: Convert notebooks to posts
      if: hashFiles('_notebooks/*.ipynb') != ''
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install nbconvert and convert
      if: hashFiles('_notebooks/*.ipynb') != ''
      run: |
        pip install jupyter nbconvert
        mkdir -p _posts
        for nb in _notebooks/*.ipynb; do
          [ -f "$nb" ] || continue
          base=$(basename "$nb" .ipynb)
          echo "Converting $nb -> _posts/${base}.md"
          jupyter nbconvert --to markdown "$nb" --output-dir _posts \
            --output "${base}.md" \
            --TagRemovePreprocessor.remove_cell_tags='["remove_cell"]' \
            --TemplateExporter.exclude_input_prompt=True \
            --TemplateExporter.exclude_output_prompt=True 2>/dev/null || \
          jupyter nbconvert --to markdown "$nb" --output-dir _posts \
            --output "${base}.md"
          # Move any generated image assets
          if [ -d "_posts/${base}_files" ]; then
            mkdir -p "images/${base}"
            mv _posts/${base}_files/* "images/${base}/" 2>/dev/null || true
            rm -rf "_posts/${base}_files"
            sed -i "s|${base}_files/|/images/${base}/|g" "_posts/${base}.md"
          fi
        done

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
        bundler-cache: true

    - name: Setup directories for Jekyll build
      run: |
        rm -rf _site
        chmod -R 777 .
        chmod -R 777 .

    - name: Jekyll build
      run: bundle exec jekyll build --strict_front_matter --trace
      run: bundle exec jekyll build --strict_front_matter --trace
      env:
        JEKYLL_ENV: 'production'

    - name: Copy CNAME file into _site if exists

    - name: Copy CNAME file into _site if exists
      run: |
        chmod -R 777 _site/
        chmod -R 777 _site/
        cp CNAME _site/ 2>/dev/null || :

    - name: Upload Pages artifact
      if: github.event_name == 'push'
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./_site

  deploy:
    if: github.event_name == 'push'
    needs: build-site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
