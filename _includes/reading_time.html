<span class="read-time" title="Estimated read time">
    {% if include.post_content %}
        {% assign words = include.post_content | strip_html | number_of_words %}
    {% else %}
        {% assign words = content | strip_html | number_of_words %}
    {% endif %}
    {% if words < 360 %}
      1 min read
    {% else %}
      {{ words | divided_by:180 }} mins read
    {% endif %}
</span>
