<!-- Privacy-respecting lazy-loaded comments (connects to GitHub via utteranc.es only when requested) -->
<div id="utterances-container">
    <div id="comments-placeholder" class="consent-placeholder">
        <p><i class="fas fa-comments"></i> <strong>Comments</strong></p>
        <p class="consent-detail">Loading comments connects to GitHub via utteranc.es and may set cookies. By clicking below, you consent to loading external content that may set third-party cookies. This preference will be remembered across all pages.</p>
        <button id="load-comments" class="button is-rounded">
            <i class="fas fa-comment-dots"></i> Load Comments
        </button>
    </div>
</div>
<script>
(function() {
    function loadUtterances() {
        var placeholder = document.getElementById('comments-placeholder');
        if (!placeholder) return;
        placeholder.innerHTML = '<p><i class="fas fa-spinner fa-spin"></i> Loading comments...</p>';

        var isDark = typeof window.isDarkMode === 'function' ? window.isDarkMode() : window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = isDark ? 'github-dark' : 'github-light';

        var script = document.createElement('script');
        script.src = 'https://utteranc.es/client.js';
        script.setAttribute('repo', '{{ site.github_username }}/{{ site.github_repo | default: site.baseurl | remove: "/" }}');
        script.setAttribute('issue-term', 'title');
        script.setAttribute('label', 'blogpost-comment');
        script.setAttribute('theme', theme);
        script.setAttribute('crossorigin', 'anonymous');
        script.async = true;

        var container = document.getElementById('utterances-container');
        container.appendChild(script);

        window.addEventListener('message', function handler(event) {
            if (event.origin === 'https://utteranc.es') {
                placeholder.remove();
                window.removeEventListener('message', handler);
            }
        });
    }

    // Use shared consent helpers from consent-gate.js (fallback if not loaded)
    var consent = window._consent || {
        get: function() { try { return JSON.parse(localStorage.getItem('embedConsent')) || {}; } catch(e) { return {}; } },
        set: function(p) { var c = this.get(); c[p] = true; localStorage.setItem('embedConsent', JSON.stringify(c)); }
    };

    if (consent.get().comments) {
        loadUtterances();
    } else {
        document.getElementById('load-comments').addEventListener('click', function() {
            consent.set('comments');
            loadUtterances();
        });
    }
})();
</script>
