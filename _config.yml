# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog.
#
# If you need help with YAML syntax, here are some quick references for you: 
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/

title: Curiosity
description: >- # this means to ignore newlines until "baseurl:"
  I am curious. Therefore I am.
author:
  name: Zeeshan Khan Suri
  email: zshn25[at]gmail[dot]com
github_username: zshn25
# you can comment the below line out if your repo name is not different than your baseurl
github_repo: "zshn25.github.io"

# OPTIONAL: override baseurl and url if using a custom domain
# Note: leave out the trailing / from this value. 
url: "https://zshn25.github.io" # the base hostname & protocol for your site, e.g. http://example.com

###########################################################
#########  Special Instructions for baseurl ###############
#
#### Scenario One: If you do not have a Custom Domain #####
#    -  if you are not using a custom domain, the baseurl *must* be set to your repo name
# 
####  Scenario Two: If you have a Custom Domain #####
# 1. If your domain does NOT have a subpath, this leave this value as ""
# 2. If your domain does have a subpath, you must preceed the value with a / and NOT have a / at the end.  
#      For example: 
#           "" is valid
#           "/blog"        is valid
#            "/blog/site/" is invalid  ( / at the end)
#            "/blog/site"  is valid
#            "blog/site"   is invalid  ( because doesn't begin with a /)
#
# 3. You must replace the parameter `baseurl` in _action_files/settings.ini with the same value as you set here but WITHOUT QUOTES.
#
baseurl: "" # the subpath of your site, e.g. "/blog".
permalink: /:title/

# Github and twitter are optional:
minima:
  social_links:
    - { platform: github,  user_url: "https://github.com/zshn25" }
    - { platform: twitter,  user_url: "https://twitter.com/zshn25" }
    - { platform: linkedin,  user_url: "https://www.linkedin.com/in/zshn25" }
    - { platform: google_scholar, user_url: "https://scholar.google.com/citations?user=DSLVuBgAAAAJ" }

# Set this to true to get LaTeX math equation support
use_math: true

# Set this to true to display the summary of your blog post under your title on the Home page.
show_description: true

# Set this to true to display image previews on home page, if they exist
show_image: true

# Set this to true to turn on annotations with hypothes.is (https://web.hypothes.is/)
annotations: false

# Set this to true to display tags on each post
show_tags: true

# Add your Google Analytics ID here if you have one and want to use it
google_analytics: false

# SEO settings
lang: en

# Post categories for navigation
post_categories:
  - name: Tech
    description: "AI, ML, CV, Deep Learning, Programming"
    icon: "fas fa-microchip"
  - name: Philosophy
    description: "Politics, Ethics, Meaning of Life"
    icon: "fas fa-brain"
  - name: Life
    description: "Health, Food, Finance, Miscellaneous"
    icon: "fas fa-seedling"

# Pages to show in the header navigation (in order)
# Search is inline in the header; Tags word cloud is at the bottom of the homepage
header_pages:
  - _pages/about.md

exclude:
  - docker-compose.yml
  - action.yml
  - Makefile

# this setting allows you to keep pages organized in the _pages folder
include:
  - _pages
  - .well-known

# This specifies what badges are turned on by default for notebook posts.
default_badges:
  github: true
  binder: true
  colab: true

# Escape HTML in post descriptions
html_escape:
  description: false

# Everything below here should be left alone. Modifications may break fastpages
future: true
# theme: minima
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-octicons
  # - jekyll-toc
  # - jekyll-twitter-plugin  # Twitter embeds handled by consent-gate.js instead
  - jekyll-relative-links
  - jekyll-seo-tag
  - jekyll-remote-theme
  - jekyll-paginate
  - jekyll-sitemap
  # jemoji removed: loads emoji images from github.githubassets.com CDN (privacy leak)
  # Use native Unicode emoji instead of :shortcodes:

# See https://jekyllrb.com/docs/pagination/
# For pagination to work, you cannot have index.md at the root of your repo, instead you must rename this file to index.html
paginate: 15
paginate_path: /page:num/

remote_theme: jekyll/minima

titles_from_headings:
  enabled:     true
  strip_title: true
  collections: true

highlighter: rouge
markdown: kramdown
kramdown:
  math_engine: katex
  input: GFM
  auto_ids: true
  hard_wrap: false
  syntax_highlighter: rouge

# Silence Sass deprecation warnings from the minima remote theme
sass:
  quiet_deps: true

# to limit size of xml as it can grow quite large.
feed:
  posts_limit: 5 #default posts_limit: 10
  excerpt_only: true
